<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Get in touch with the Victoria Drive Safety Society Alliance — send a message or reach us directly by phone or email.">
    <title>Contact | Victoria Drive Safety Society Alliance</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/contact.css">
</head>
<body>

    <!-- ============ HEADER / NAV — same block on every page ============ -->
    <header class="header">
        <div class="logo"><img class="logo-img" src="images/VDSSA_Logo.png" alt="VDSSA logo"></div>
        <nav class="menu">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
                <li><a href="events.html">Events</a></li>
            </ul>
        </nav>
        <button class="menu-toggle" aria-label="Toggle navigation menu" aria-expanded="false">
            <span></span><span></span><span></span>
        </button>
    </header>

    <!-- ============ CONTACT CONTENT ============ -->
    <div class="container contact-container">
        <h1>Get In Touch</h1>
        <p>Have a question, tip, or want to get involved? Send us a message.</p>

        <!-- Placeholder form only — no action/method wired up yet,
             hook this up to a form service or backend when ready -->
        <form class="contact-form">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Send Message</button>
        </form>

        <!-- Direct contact info, edit or remove as needed -->
        <div class="contact-details">
            <p><strong>Email:</strong> <a href="mailto:vdssa18@gmail.com">vdssa18@gmail.com</a></p>
            <p><strong>Phone:</strong> <a href="tel:+12369823727">(236) 982-3727</a></p>
            <p><strong>Tel:</strong> <a href="tel:+12369922892">(236) 992-2892</a></p>
        </div>
    </div>

    <!-- ============ FOOTER — same block on every page ============ -->
    <footer class="footer">
        <p>&copy; 2026 Victoria Drive Safety Society Alliance</p>
        <p>#208-5887 Victoria Drive, Vancouver, BC V5P 3W5</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
